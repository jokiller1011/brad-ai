name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Inject ElevenLabs API key
        env:
          ELEVENLABS_KEY: ${{ secrets.elevenlabs-api }}
        run: |
          sed -i "s/__ELEVENLABS_API_KEY__/${ELEVENLABS_KEY}/g" js/app.js

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
