<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BradAI – Professional AI Chat</title>
  <!-- Fonts & libraries CDN -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Times+New+Roman&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <button id="new-chat-btn" class="sidebar-btn new-chat">+ New Chat</button>
      </div>
      <div class="search-box">
        <input type="text" placeholder="Search conversations...">
      </div>
      <nav class="conversation-list" id="conversation-list">
        <!-- Populated by JS -->
      </nav>
      <div class="sidebar-footer">
        <a href="pricing.html" class="pricing-link">Pricing</a>
        <a href="#" class="discover-link">Discover Agents</a>
      </div>
    </aside>

    <!-- Main Chat Area -->
    <main class="chat-main">
      <!-- Top bar -->
      <header class="top-bar">
        <div class="top-left">
          <select id="model-select" class="model-select">
            <option value="spark">Spark (Everyday)</option>
            <option value="swift">Swift (Fast)</option>
            <option value="fleet">Fleet (Code & Math)</option>
          </select>
          <div class="agents-toggle">
            <label class="switch">
              <input type="checkbox" id="agents-switch">
              <span class="slider"></span>
            </label>
            <span class="toggle-label">Agents</span>
          </div>
          <div class="skills-dropdown">
            <button id="skills-btn">Skills ▾</button>
            <div id="skills-menu" class="dropdown-menu hidden">
              <!-- Skills populated by skills.js -->
            </div>
          </div>
        </div>
        <div class="top-right">
          <button id="settings-btn" class="icon-btn">⚙️</button>
          <div class="user-avatar">B</div>
        </div>
      </header>

      <!-- Chat messages -->
      <div class="chat-container" id="chat-container">
        <div class="welcome-screen">
          <h1>BradAI</h1>
          <p class="suggestions-title">Try these prompts</p>
          <div class="suggestion-chips">
            <div class="chip" data-prompt="Explain quantum computing in simple terms">Explain quantum computing</div>
            <div class="chip" data-prompt="Write a Python script to sort a list of numbers">Python sorting script</div>
            <div class="chip" data-prompt="Draft a polite email declining a meeting">Draft an email</div>
            <div class="chip" data-prompt="Solve: x^2 - 5x + 6 = 0">Math: x² - 5x + 6 = 0</div>
          </div>
        </div>
      </div>

      <!-- Input area -->
      <div class="input-area">
        <div id="file-previews" class="file-previews hidden"></div>
        <div class="input-box-wrapper">
          <button id="upload-btn" class="upload-btn">📎</button>
          <input type="text" id="user-input" placeholder="Ask anything..." autofocus>
          <button id="send-btn" class="send-btn">➤</button>
        </div>
        <p class="footer-note">BradAI may produce inaccurate information. Verify important facts.</p>
      </div>
    </main>
  </div>

  <!-- Hidden file input -->
  <input type="file" id="file-input" multiple hidden>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
  <script src="js/skills.js"></script>
  <script src="js/fileHandler.js"></script>
  <script src="js/agents.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
